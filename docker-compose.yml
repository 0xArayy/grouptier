version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: grouptier
      POSTGRES_PASSWORD: grouptier
      POSTGRES_DB: grouptier
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/scripts/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  pgdata:
